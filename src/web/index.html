<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakthrough</title>
  <style>
    :root { --panel-bg: #303030; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #14171c;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      display: grid;
      grid-template-columns: auto 320px;
      gap: 16px;
      max-width: 920px;
      width: 100%;
    }
    .board-wrap {
      background: var(--panel-bg);
      border-radius: 8px;
      padding: 8px;
      transition: background 0.2s;
    }
    canvas#board {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      touch-action: none;
    }
    .side { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .controls label { font-size: 12px; color: #9aa4b2; display: block; margin-bottom: 2px; }
    .controls select, .controls button {
      width: 100%;
      padding: 7px 8px;
      background: #222831;
      color: #e0e0e0;
      border: 1px solid #3a4250;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .controls button:hover { background: #2c333d; }
    .controls .full { grid-column: 1 / -1; }
    #status {
      padding: 8px 10px;
      background: #1b1f25;
      border-radius: 6px;
      font-size: 14px;
      min-height: 20px;
    }
    #output {
      flex: 1;
      min-height: 280px;
      max-height: 420px;
      overflow-y: auto;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    h1 { font-size: 18px; margin: 0 0 4px; font-weight: 600; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #9aa4b2;
      cursor: pointer;
      padding: 4px 0;
    }
    .toggle input { cursor: pointer; }
    #output.hidden { display: none; }
    .footer {
      font-size: 12px;
      padding-top: 4px;
    }
    .footer a {
      color: #6ba2d6;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .side { order: 2; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="board-wrap">
      <canvas id="board" width="560" height="560"></canvas>
    </div>
    <div class="side">
      <h1>Breakthrough</h1>
      <div class="controls">
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="mp1">Machine plays White</option>
            <option value="mp2">Machine plays Black</option>
            <option value="two">Two Machines</option>
            <option value="human">Human vs Human</option>
          </select>
        </div>
        <div>
          <label for="depth">Engine depth</label>
          <select id="depth">
            <option>2</option><option>4</option><option>6</option>
            <option>8</option><option>10</option><option>12</option>
          </select>
        </div>
        <div>
          <label for="theme">Theme</label>
          <select id="theme"></select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="flip">Flip board</button>
        </div>
        <button id="newgame" class="full">New game</button>
        <button id="undo" class="full">Undo</button>
        <button id="save" class="full">Save game</button>
        <button id="load" class="full">Load game</button>
        <button id="rules" class="full">Rules (Wikipedia)</button>
        <label class="full toggle">
          <input type="checkbox" id="showoutput" /> Show engine output
        </label>
      </div>
      <div id="status">Loading…</div>
      <div id="output" class="hidden"></div>
      <div class="footer">
        <a href="https://github.com/MartinMSPedersen/Breakthrough-Web" target="_blank" rel="noopener">Source on GitHub</a>
      </div>
    </div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
